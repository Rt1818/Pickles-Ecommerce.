services:
  # 🫙 Backend API Web Service
  - type: web
    name: pickles-backend-rt1818
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: super_secret_jwt_key_12345
      - key: MYSQL_HOST
        value: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: MYSQL_PORT
        value: "4000"
      - key: MYSQL_USER
        value: RhLGi56fr86DECx.root
      - key: MYSQL_PASSWORD
        value: YZUGKPYZgg2MVURg
      - key: MYSQL_DATABASE
        value: sys
      - key: MYSQL_SSL
        value: "true"
      - key: CLIENT_URL
        value: https://pickles-frontend-rt1818.onrender.com

  # 💻 Frontend React Static Site
  - type: web
    name: pickles-frontend-rt1818
    runtime: static
    rootDir: web
    buildCommand: npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://pickles-backend-rt1818.onrender.com/api

